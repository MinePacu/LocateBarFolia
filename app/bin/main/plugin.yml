name: LocateBarFolia
version: 1.0.0-SNAPSHOT
main: com.example.locatebarfolia.LocateBarPlugin
api-version: "1.21"
folia-supported: true
commands:
  locatebar:
    description: Toggle or reload the LocateBarFolia display.
    usage: /locatebar <on|off|toggle|reload>
permissions:
  locatebar.use:
    description: Allows players to use the LocateBarFolia toggle command.
    default: true
  locatebar.admin:
    description: Allows reloading LocateBarFolia.
    default: op
