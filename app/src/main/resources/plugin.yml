name: LocateBarFolia
version: 1.0.1
main: com.example.locatebarfolia.LocateBarPlugin
api-version: "1.21"
folia-supported: true
softdepend:
  - floodgate
  - Geyser-Spigot
commands:
  locatebar:
    description: Toggle, resize, or reload the LocateBarFolia display.
    usage: /locatebar <on|off|toggle|radius|reload>
permissions:
  locatebar.use:
    description: Reserved for compatibility. Player self-toggle commands are available to all players.
    default: true
  locatebar.admin:
    description: Allows reloading LocateBarFolia.
    default: op
